<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--white); padding: 28px; }
  .item { margin-bottom: 20px; }
  .eyebrow { font-weight:700; font-size:17px; letter-spacing:.12em; text-transform:uppercase; color:var(--navy-700); }
  .btnlabel { font-weight:700; font-size:17px; letter-spacing:.05em; text-transform:uppercase; color:var(--green-500); }
  .tag { font-size: 12px; color: var(--text-subtle); margin-left: 12px; letter-spacing:0; text-transform:none; }
</style>
</head>
<body>
  <div class="item"><span class="eyebrow">What parents say</span><span class="tag">Eyebrow · tracking .12em</span></div>
  <div class="item"><span class="btnlabel">Start screening →</span><span class="tag">Button · Inter 700 caps · tracking .05em</span></div>
</body>
</html>
