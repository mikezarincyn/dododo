<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--white); padding: 32px; }
  .row { display:flex; align-items:center; gap: 48px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:12px; }
  img { display:block; }
  .n { font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><img src="../assets/confetti-dot-yellow.svg" width="40" height="40" alt=""/><span class="n">yellow dot</span></div>
    <div class="item"><img src="../assets/confetti-triangle-pink.svg" width="34" height="30" alt=""/><span class="n">blush triangle</span></div>
    <div class="item"><img src="../assets/confetti-triangle-blue.svg" width="34" height="30" alt=""/><span class="n">blue triangle</span></div>
    <div class="item"><img src="../assets/sparkle.svg" width="36" height="36" alt=""/><span class="n">sparkle</span></div>
  </div>
</body>
</html>
