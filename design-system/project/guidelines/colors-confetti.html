<!-- @dsCard group="Colors" viewport="700x150" name="Confetti & accents" subtitle="Playful geometric accents + reserved badges" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--white); padding: 24px; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .sw { flex: 1; min-width: 110px; }
  .chip { height: 76px; border-radius: var(--radius-md); box-shadow: var(--shadow-card); }
  .name { font-weight: 700; font-size: 14px; color: var(--ink-900); margin-top: 10px; }
  .hex  { font-size: 13px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--confetti-yellow)"></div><div class="name">Yellow</div><div class="hex">#FFD983 · dot</div></div>
    <div class="sw"><div class="chip" style="background:var(--confetti-pink)"></div><div class="name">Blush</div><div class="hex">#EFCFC9 · triangle</div></div>
    <div class="sw"><div class="chip" style="background:var(--confetti-blue)"></div><div class="name">Light blue</div><div class="hex">#D0EFFB · triangle</div></div>
    <div class="sw"><div class="chip" style="background:var(--coral-500)"></div><div class="name">Coral</div><div class="hex">#EE6C4D · badge</div></div>
    <div class="sw"><div class="chip" style="background:var(--blush-100)"></div><div class="name">Blush bg</div><div class="hex">#F9D7DB · band</div></div>
  </div>
</body>
</html>
