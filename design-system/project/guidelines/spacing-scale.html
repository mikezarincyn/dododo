<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px base · generous whitespace" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--white); padding: 28px; }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .col { text-align: center; }
  .bar { background: var(--green-100); border-radius: 4px; }
  .n { font-size: 12px; color: var(--text-muted); margin-top: 8px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="width:4px;height:4px"></div><div class="n">1·4</div></div>
    <div class="col"><div class="bar" style="width:8px;height:8px"></div><div class="n">2·8</div></div>
    <div class="col"><div class="bar" style="width:16px;height:16px"></div><div class="n">4·16</div></div>
    <div class="col"><div class="bar" style="width:24px;height:24px"></div><div class="n">5·24</div></div>
    <div class="col"><div class="bar" style="width:32px;height:32px"></div><div class="n">6·32</div></div>
    <div class="col"><div class="bar" style="width:40px;height:40px"></div><div class="n">7·40</div></div>
    <div class="col"><div class="bar" style="width:56px;height:56px"></div><div class="n">8·56</div></div>
    <div class="col"><div class="bar" style="width:72px;height:72px"></div><div class="n">9·72</div></div>
  </div>
</body>
</html>
