<!-- @dsCard group="Type" viewport="700x200" name="Two-tone headline" subtitle="The signature trick: base weight 400, emphasis 700" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--white); padding: 32px; }
  .tt { font-family: var(--font-heading); font-weight: 400; letter-spacing: .02em; color: var(--navy-700); font-size: 40px; line-height: 1.08; text-wrap: balance; margin: 0; }
  .tt strong { font-weight: 700; }
  .tag { display:block; margin-top: 18px; font-size: 13px; color: var(--text-subtle); }
</style>
</head>
<body>
  <p class="tt">The waiting list can take months. But your child's <strong>development isn't waiting.</strong></p>
  <span class="tag">Poppins · regular base + bold emphasis on the emotional payload</span>
</body>
</html>
