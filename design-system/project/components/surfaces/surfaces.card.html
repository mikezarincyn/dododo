<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--grey-surface-100); padding: 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  h4 { font-family: var(--font-heading); color: var(--navy-700); margin: 0 0 8px; font-size: 20px; }
  p { margin: 0; font-size: 15px; color: var(--text-muted); line-height: 1.5; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Card, ConfettiBurst } = window.DododoDesignSystem_cdf388;
  function Demo() {
    return (
      <div className="grid">
        <div style={{ position: 'relative' }}>
          <Card tone="white" style={{ position: 'relative', overflow: 'hidden' }}>
            <ConfettiBurst pieces="default" assetBase="../../assets" />
            <h4>Today's plan</h4>
            <p>Gentle rocking · 3 min. Slow, predictable input to support balance.</p>
          </Card>
        </div>
        <Card tone="mint">
          <h4>With Dododo</h4>
          <p>You understand why it's happening — clear daily steps, designed with therapists.</p>
        </Card>
        <Card tone="grey">
          <h4 style={{ color: 'rgba(43,42,42,.75)' }}>The challenge</h4>
          <p>Frequent meltdowns · hard transitions · conflicting advice.</p>
        </Card>
        <Card tone="yellow">
          <h4>For you</h4>
          <p>Parent emotional wellbeing — build a strong foundation for both of you.</p>
        </Card>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
