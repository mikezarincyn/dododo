<!-- @dsCard group="Components" viewport="700x360" name="Buttons & badges" subtitle="Pill buttons (primary/secondary/outline/soft) + status badges" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--white); padding: 32px; }
  .grid { display: flex; flex-direction: column; gap: 22px; }
  .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .lbl { font-size: 12px; color: var(--text-subtle); width: 100%; margin-bottom: -8px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, Badge } = window.DododoDesignSystem_cdf388;
  function Demo() {
    return (
      <div className="grid">
        <div className="row">
          <span className="lbl">Variants</span>
          <Button variant="primary" iconRight="→">Get a clear picture</Button>
          <Button variant="secondary">Let's go!</Button>
          <Button variant="outline">Choose plan</Button>
          <Button variant="soft" uppercase iconRight="→">Start screening</Button>
        </div>
        <div className="row">
          <span className="lbl">Sizes & disabled</span>
          <Button variant="primary" size="sm">Small</Button>
          <Button variant="primary">Large</Button>
          <Button variant="primary" disabled>Disabled</Button>
        </div>
        <div className="row">
          <span className="lbl">Badges</span>
          <Badge tone="coral">most popular</Badge>
          <Badge tone="green">typical for age</Badge>
          <Badge tone="yellow">emerging</Badge>
          <Badge tone="lilac">step 1</Badge>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
